services:
  - type: web
    name: agroconnect-backend
    runtime: python
    rootDir: backend_django
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT agroconnect_django.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: agroconnect-backend.onrender.com
      - key: FRONTEND_URL
        value: https://agroconnect.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: agroconnect-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: agroconnect-db
    databaseName: agroconnect
    user: agroconnect
    plan: free
